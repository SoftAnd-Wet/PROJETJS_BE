# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/study_planner?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=3f8d2a1b9c7e4f6a0d5b8c2e1a9f7d3b6c4e2a0f8d1b5c9e3a7f2d6b0c4e8a1
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ===== Server =====
server.port=8080
